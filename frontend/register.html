<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CastleMarket</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <i class="fas fa-shopping-cart"></i>
                    <span>CastleMarket</span>
                </div>
                
                <div class="nav-search">
                    <form action="search.php" method="GET" role="search">
                        <input type="text" placeholder="Search products..." id="search-input" name="q" aria-label="Search products">
                        <button type="submit" id="search-btn" aria-label="Search">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                </div>
                
                <div class="nav-links">
                    <a href="client/products.html">Products</a>
                    <a href="categories.php">Categories</a>
                    <a href="index.html">Login</a>
                </div>
            </div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Register</h2>
                <div id="register-error" class="error" style="display: none;"></div>
                <form id="register-form">
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <select name="role" required>
                        <option value="client">Client</option>
                        <option value="delivery_person">Delivery Person</option>
                    </select>
                    <input type="text" name="name" placeholder="Full Name" required>
                    <textarea name="address" placeholder="Address"></textarea>
                    <input type="tel" name="phone" placeholder="Phone">
                    <button type="submit">Register</button>
                </form>
                <p>Already have an account? <a href="index.html">Login</a></p>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>CastleMarket</h3>
                <p>Your trusted online grocery store</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="client/products.html">Products</a></li>
                    <li><a href="categories.php">Categories</a></li>
                    <li><a href="index.html">Login</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="social-links">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 CastleMarket Delivery. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Register form submission
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);

            fetch('/castlemarket/backend/auth/register.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = 'index.php';
                } else {
                    document.getElementById('register-error').textContent = data.message;
                    document.getElementById('register-error').style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('register-error').textContent = 'An error occurred. Please try again.';
                document.getElementById('register-error').style.display = 'block';
            });
        });
    </script>
</body>
</html>
